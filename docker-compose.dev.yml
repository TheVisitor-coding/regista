services:
  api:
    image: node:22-alpine
    container_name: regista-api-dev
    working_dir: /workspace
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-regista-dev-jwt-secret-change-me-in-production}
      APP_KEY: ${APP_KEY:-regista-dev-key-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DATABASE_URL: postgresql://${POSTGRES_USER:-regista}:${POSTGRES_PASSWORD:-regista}@postgres:5432/${POSTGRES_DB:-regista}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    command: >
      sh -c "
      corepack enable &&
      corepack prepare pnpm@9.15.4 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @regista/api dev
      "
    volumes:
      - .:/workspace
      - regista_api_root_node_modules:/workspace/node_modules
      - regista_api_api_node_modules:/workspace/apps/api/node_modules
      - regista_api_web_node_modules:/workspace/apps/web/node_modules
      - regista_api_shared_node_modules:/workspace/packages/shared/node_modules
      - regista_api_db_node_modules:/workspace/packages/db/node_modules
      - regista_api_pnpm_store:/root/.local/share/pnpm/store
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3001/health'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: node:22-alpine
    container_name: regista-web-dev
    working_dir: /workspace
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3001}
    command: >
      sh -c "
      corepack enable &&
      corepack prepare pnpm@9.15.4 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @regista/web exec vite dev --host 0.0.0.0 --port 3000
      "
    volumes:
      - .:/workspace
      - regista_web_root_node_modules:/workspace/node_modules
      - regista_web_api_node_modules:/workspace/apps/api/node_modules
      - regista_web_web_node_modules:/workspace/apps/web/node_modules
      - regista_web_shared_node_modules:/workspace/packages/shared/node_modules
      - regista_web_db_node_modules:/workspace/packages/db/node_modules
      - regista_web_pnpm_store:/root/.local/share/pnpm/store
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  regista_api_root_node_modules:
  regista_api_api_node_modules:
  regista_api_web_node_modules:
  regista_api_shared_node_modules:
  regista_api_db_node_modules:
  regista_api_pnpm_store:
  regista_web_root_node_modules:
  regista_web_api_node_modules:
  regista_web_web_node_modules:
  regista_web_shared_node_modules:
  regista_web_db_node_modules:
  regista_web_pnpm_store:
